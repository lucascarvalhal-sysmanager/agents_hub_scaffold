type: single
agent:
  name: test_agent
  model: gemini-2.5-pro
  description: Agente de teste para validar as skills
  instruction: |
    Você é um agente de TESTE.
    Responda em português.
    Use as ferramentas disponíveis quando necessário.
  tools:
    - SmartSearchAgent
    - read_repo
    - get_datetime

tools:
  - name: SmartSearchAgent
    transport: pre_built
    type: SmartSearchAgent

  - name: read_repo
    transport: pre_built
    type: read_repo_context
    provider: github
    connection_config:
      username: ${GITHUB_USERNAME}
      token: ${GITHUB_TOKEN}

  - name: get_datetime
    transport: pre_built
    type: get_current_datetime
